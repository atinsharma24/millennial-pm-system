version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: millennial_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: millennial_pm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: millennial_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: millennial_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/millennial_pm
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: docker-access-secret
      JWT_REFRESH_SECRET: docker-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      EMAIL_FROM: "Millennial PM <noreply@millennialcompany.in>"
    ports:
      - "4000:4000"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: millennial_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
  api_uploads:
